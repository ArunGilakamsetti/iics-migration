name: On‑demand Deployment

run-name: Deploy to ${{ inputs.environment }} ${{ inputs.object_file && format('(using file {0})', inputs.object_file) || '(custom objects)' }}

on:
  workflow_dispatch:
    inputs:
      object_file:
        description: |
          Path to a file in the repository containing the list of objects (one per line). 
          Example: configs/hotfix-objects.txt
        required: false
        type: string
      objects:
        description: |
          Alternatively, paste the list of objects here (one per line). 
          Ignored if object_file is provided.
        required: false
        type: string
      environment:
        description: 'Target Environment'
        required: true
        default: 'uat'
        type: choice
        options: [ uat, prod ]

env:
  IICS_REGION: ap
  IICS_POD_HOST: dm-ap.informaticacloud.com

jobs:
  # ---- JOB 1: Prepare export list ----
  prepare-export:
    name: Prepare Objects List
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (branch selected in workflow_dispatch)
        uses: actions/checkout@v4

      - name: Generate artifacts file
        id: generate
        run: |
          if [ -n "${{ github.event.inputs.object_file }}" ]; then
            # Read from file (path relative to repo root)
            if [ ! -f "${{ github.event.inputs.object_file }}" ]; then
              echo "File not found: ${{ github.event.inputs.object_file }}"
              exit 1
            fi
            cp "${{ github.event.inputs.object_file }}" artifacts.txt
            echo "Using object list from file: ${{ github.event.inputs.object_file }}"
          elif [ -n "${{ github.event.inputs.objects }}" ]; then
            # Use multiline input
            printf "%s\n" "${{ github.event.inputs.objects }}" > artifacts.txt
            echo "Using manually provided object list"
          else
            echo "Either object_file or objects must be provided"
            exit 1
          fi
          echo "Objects to export:"
          cat artifacts.txt

      - name: Upload export list
        uses: actions/upload-artifact@v4
        with:
          name: export-list
          path: artifacts.txt

  # ---- JOB 2: Export from Dev ----
  export-assets:
    name: Export from Dev
    needs: prepare-export
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Download export list
        uses: actions/download-artifact@v4
        with:
          name: export-list
          path: ./

      - name: Download IICS CLI
        run: |
          curl -L -o iics https://github.com/InformaticaCloudApplicationIntegration/Tools/raw/master/IICS%20Asset%20Management%20CLI/v2/linux-x86_64/iics
          chmod +x iics
          ./iics version

      - name: Export IICS assets
        run: |
          ./iics export \
            -n "Deploy_Export_${{ github.run_id }}" \
            -r ${{ env.IICS_REGION }} \
            --podHostName ${{ env.IICS_POD_HOST }} \
            -u ${{ secrets.DEV_IICS_USER }} \
            -p ${{ secrets.DEV_IICS_PWD }} \
            -f artifacts.txt \
            -z exported.zip \
            -s true

      - name: Upload exported package
        uses: actions/upload-artifact@v4
        with:
          name: exported-package
          path: exported.zip

  # ---- JOB 3: Prepare deployment package (override + repackage) ----
  prepare-deploy:
    name: Prepare for ${{ github.event.inputs.environment }}
    needs: export-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (again, for config files)
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download IICS CLI
        run: |
          curl -L -o iics https://github.com/InformaticaCloudApplicationIntegration/Tools/raw/master/IICS%20Asset%20Management%20CLI/v2/linux-x86_64/iics
          chmod +x iics

      - name: Download exported package
        uses: actions/download-artifact@v4
        with:
          name: exported-package
          path: ./

      - name: Extract package
        run: |
          mkdir -p workspace_deploy
          ./iics extract -z exported.zip -w workspace_deploy

      - name: Apply environment overrides
        run: |
          python3 scripts/apply_mappings.py \
            configs/${{ github.event.inputs.environment }}_config.json \
            workspace_deploy

      - name: Generate assets list from workspace
        run: |
          find workspace_deploy/Explore -name "*.Project.json" -not -path "*/.*" | sed 's|workspace_deploy/||; s|\.json$||' > workspace_deploy/assets.txt
          echo "Assets to deploy:"
          cat workspace_deploy/assets.txt
          if [ ! -s workspace_deploy/assets.txt ]; then
            echo "No project assets found!"
            exit 1
          fi

      - name: Repackage with overrides
        run: |
          ./iics package \
            -w workspace_deploy \
            -f workspace_deploy/assets.txt \
            -z ready_to_deploy.zip

      - name: Upload final package
        uses: actions/upload-artifact@v4
        with:
          name: final-package
          path: ready_to_deploy.zip

  # ---- JOB 4: Deploy to target environment ----
  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    needs: prepare-deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Download IICS CLI
        run: |
          curl -L -o iics https://github.com/InformaticaCloudApplicationIntegration/Tools/raw/master/IICS%20Asset%20Management%20CLI/v2/linux-x86_64/iics
          chmod +x iics

      - name: Download final package
        uses: actions/download-artifact@v4
        with:
          name: final-package
          path: ./

      - name: Import to ${{ github.event.inputs.environment }}
        run: |
          ./iics import \
            -n "Deploy_${{ github.run_id }}" \
            -r ${{ env.IICS_REGION }} \
            --podHostName ${{ env.IICS_POD_HOST }} \
            -u ${{ secrets[format('{0}_IICS_USER', github.event.inputs.environment)] }} \
            -p ${{ secrets[format('{0}_IICS_PWD', github.event.inputs.environment)] }} \
            -z ready_to_deploy.zip \
            -s true